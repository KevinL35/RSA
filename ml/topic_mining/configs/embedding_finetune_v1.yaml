# 主题挖掘：句向量领域微调（MNRL，同主题为正样本对）
# 前置：已用任意句向量跑过一轮 BERTopic，得到每条评论的 topic 列（含 -1 离群可跳过）。
# 训练后再用 output_dir 作为 run_bertopic.py / Notebook 的 embedding 路径。

version: "1.0.0"
task: "topic_embedding_finetune_mnrl"

base_embedding_model: "BAAI/bge-base-en-v1.5"
# 默认与 run_bertopic.py 写出的 doc_topics_for_embedding_finetune.csv 对齐；可改为你自己的首轮结果表
training_csv: "ml/topic_mining/reports/doc_topics_for_embedding_finetune.csv"
text_column: "analysis_input_en"
topic_column: "topic"

output_dir: "models/topic_embedding/bge-mnrl-after-bertopic-r1"

epochs: 2
batch_size: 32
learning_rate: 2.0e-5
warmup_ratio: 0.1
max_pairs: 200000

# 每个 anchor 从同主题内随机采样的正样本数（不足则重复采样或跳过）
positives_per_anchor: 1

skip_topic_ids:
  - -1

random_seed: 42
