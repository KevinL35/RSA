# Colab 默认：train.csv / val.csv / test.csv 放在 ml/data/splits/。
# 若 train 仅拆成多文件上传，见 train_roberta_colab_shards.yaml 与 scripts/merge_train_shards.py。
version: "1.0.0"
experiment_name: "roberta-sentiment-v0-colab"

model:
  pretrained_name: "roberta-base"
  num_labels: 3
  max_length: 256

data:
  cleaned_csv: "ml/data/processed/reviews_cleaned.csv"
  train_csv: "ml/data/splits/train.csv"
  val_csv: "ml/data/splits/val.csv"
  test_csv: "ml/data/splits/test.csv"
  text_column: "analysis_input_en"
  label_column: "label_sentiment"
  split:
    train_size: 0.8
    val_size: 0.1
    test_size: 0.1
    random_seed: 42

training:
  output_dir: "ml/artifacts/roberta-sentiment-v0-colab"
  learning_rate: 2e-5
  num_train_epochs: 1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  weight_decay: 0.01
  logging_steps: 100
  eval_strategy: "epoch"
  save_strategy: "epoch"
  metric_for_best_model: "accuracy"
  greater_is_better: true
  seed: 42

evaluation:
  report_output: "ml/reports/sentiment_eval_v0_colab.json"

