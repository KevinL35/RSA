# Colab：训练数据在 Google Drive 的 finetune/data/splits/（无需拷到 ml/data/splits）。
# 需先 drive.mount('/content/drive')。路径：MyDrive/RSA/finetune/data/splits/

version: "1.0.0"
experiment_name: "roberta-sentiment-v0-colab"

model:
  pretrained_name: "roberta-base"
  num_labels: 3
  max_length: 256

data:
  cleaned_csv: "ml/data/processed/reviews_cleaned.csv"
  train_csv: "/content/drive/MyDrive/RSA/finetune/data/splits/train.csv"
  train_csv_shard_glob: "/content/drive/MyDrive/RSA/finetune/data/splits/train.csv.part5-*"
  dedupe_train_on_id: true
  val_csv: "/content/drive/MyDrive/RSA/finetune/data/splits/val.csv"
  test_csv: "/content/drive/MyDrive/RSA/finetune/data/splits/test.csv"
  text_column: "analysis_input_en"
  label_column: "label_sentiment"
  split:
    train_size: 0.8
    val_size: 0.1
    test_size: 0.1
    random_seed: 42

training:
  output_dir: "ml/artifacts/roberta-sentiment-v0-colab"
  learning_rate: 2e-5
  num_train_epochs: 1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  weight_decay: 0.01
  logging_steps: 100
  eval_strategy: "epoch"
  save_strategy: "epoch"
  metric_for_best_model: "accuracy"
  greater_is_better: true
  seed: 42

evaluation:
  report_output: "ml/reports/sentiment_eval_v0_colab.json"
