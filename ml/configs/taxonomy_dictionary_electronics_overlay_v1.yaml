# 电子产品垂直：在 taxonomy_dictionary_seed_v1 通用词条之上叠加；同 dimension_6way + canonical 时以本文件为准
version: "1.0.0"
taxonomy_id: "taxonomy-electronics-overlay-v1"
description: "Electronics-specific phrases merged on top of general seed (TA-6 six-way dimensions)."

entries:
  - dimension_6way: pros
    canonical: great battery life
    aliases: ["long battery", "battery lasts all day", "all day battery", "battery is amazing"]
    weight: 1.0
    priority: 72
  - dimension_6way: cons
    canonical: overheats
    aliases: ["gets hot", "runs hot", "thermal throttling", "too hot to hold"]
    weight: 1.0
    priority: 70
  - dimension_6way: cons
    canonical: screen issues
    aliases: ["dead pixels", "flickering screen", "display problem", "touchscreen glitch"]
    weight: 1.0
    priority: 68
  - dimension_6way: usage_scenario
    canonical: gaming
    aliases: ["for gaming", "AAA games", "fps stable", "gaming laptop"]
    weight: 1.0
    priority: 52
